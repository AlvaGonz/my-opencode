name: opencode-skill-orchestrator-eval
description: Evaluation suite for opencode-skill-orchestrator.
skill: opencode-skill-orchestrator
version: "1.0"

config:
  trials_per_task: 1
  max_attempts: 2
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-haiku-4.5

# Outcome check — output contains skill-relevant domain terms (zero-cost)
graders:
  - type: text
    name: outcome_check
    config:
      regex_match: ["(?i)(opencode|skill|orchestrator|meta-skill|dynamically|discovers)"]

  # Process check — output shows methodology/action language (zero-cost)
  - type: text
    name: process_check
    config:
      regex_match: ["(?i)(audit|analyze|review|check|evaluate|implement|design|configure|optimize|test|refactor|debug|monitor|assess|validate|verify|recommend|identify|apply|create|build|set.up|migrate|upgrade|integrate|deploy|document|plan|structure|organize)"]

  # Style check — output indicates quality/structure (zero-cost)
  - type: text
    name: style_check
    config:
      regex_match: ["(?i)(should|recommend|best|practice|guideline|ensure|verify|consider|approach|pattern|principle|standard|method|technique|strategy|framework|process|way|rule|convention)"]

  # Efficiency check — within tool call and duration limits
  - type: behavior
    name: efficiency_check
    config:
      max_tool_calls: 30
      max_duration_ms: 300000

tasks:
  - "tasks/*.yaml"
