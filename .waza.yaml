# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/config.schema.json

paths:
  skills: skills/
  evals: evals/
  results: results/
files:
  evalFile: eval.yaml
  taskGlob: tasks/*.yaml
  taskFileSuffix: .yaml
defaults:
  engine: copilot-sdk
  model: claude-haiku-4.5
  timeout: 300
  parallel: false
  verbose: false
  sessionLog: false
cache:
  enabled: false
  dir: .waza-cache
server:
  port: 3000
  resultsDir: results/
dev:
  model: claude-haiku-4.5
  target: medium-high
  maxIterations: 5
tokens:
  warningThreshold: 500
  fallbackLimit: 1000
graders:
  programTimeout: 30
storage:
  containerName: waza-results
